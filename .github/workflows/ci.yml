name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-corepack: true
        node-version: 20
        cache: 'npm'
        cache-dependency-path: decision-dna-tracker/package-lock.json

    - name: Install dependencies
      run: cd decision-dna-tracker && npm ci

    - name: Type check
      run: cd decision-dna-tracker && npx tsc --noEmit

    - name: Build
      run: cd decision-dna-tracker && npm run build
      env:
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
        NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
        NEXTAUTH_URL: http://localhost:3000
        RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        CRON_SECRET: ${{ secrets.CRON_SECRET }}
        SKIP_ENV_VALIDATION: true
